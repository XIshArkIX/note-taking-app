---
# .gitea/workflows/ci.yml  (copy to .gitea/workflows/ in each variant repo)
#
# Gitea Actions CI pipeline for the toolchain comparison study.
#
# Compatible with:
#   - Gitea ≥ 1.21 (Actions enabled)
#   - act-runner ≥ 0.2 (self-hosted)
#
# This workflow mirrors the stages in gitlab-ci.yml and teamcity.kts:
#   install → check (lint/typecheck) → test (unit) → e2e → build → metrics
#
# Secrets expected in the Gitea repository settings:
#   TURBO_TOKEN   – optional Turborepo remote cache token
#   TURBO_TEAM    – optional Turborepo team slug
#
# Variables (set via .gitea/workflows env or repository variables):
#   VARIANT_ID    – matches toolchain/variants/catalog.ts id
#   E2E_RUNNER    – "playwright" (default) or "cypress"

name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "latest"
  PNPM_STORE: ~/.local/share/pnpm/store
  VARIANT_ID: ${{ vars.VARIANT_ID || 'unknown' }}

jobs:
  # ── install ──────────────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - id: cache-key
        run: echo "value=pnpm-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE }}
          key: ${{ steps.cache-key.outputs.value }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ steps.cache-key.outputs.value }}

  # ── lint ─────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - run: pnpm run lint

  # ── typecheck ────────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    if: ${{ vars.TYPECHECK_CMD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - run: ${{ vars.TYPECHECK_CMD }}

  # ── unit tests ────────────────────────────────────────────────────────────
  test-unit:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - name: Run unit tests
        run: pnpm test -- --reporter=json --outputFile=test-results/unit.json
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

  # ── build (needed for e2e) ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - name: Production build
        run: pnpm run build
      - name: Compute bundle sizes
        id: sizes
        run: |
          JS=$(find .next dist out build -name "*.js" ! -name "*.map" -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}' || echo 0)
          CSS=$(find .next dist out build -name "*.css" ! -name "*.map" -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}' || echo 0)
          ART=$(du -sb .next dist out build 2>/dev/null | awk '{sum+=$1} END {print sum}' || echo 0)
          echo "js_bytes=$JS"  >> "$GITHUB_OUTPUT"
          echo "css_bytes=$CSS" >> "$GITHUB_OUTPUT"
          echo "artifact_bytes=$ART" >> "$GITHUB_OUTPUT"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1
    outputs:
      js_bytes: ${{ steps.sizes.outputs.js_bytes }}
      css_bytes: ${{ steps.sizes.outputs.css_bytes }}
      artifact_bytes: ${{ steps.sizes.outputs.artifact_bytes }}

  # ── e2e: Playwright ───────────────────────────────────────────────────────
  test-e2e-playwright:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ vars.E2E_RUNNER != 'cypress' }}
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
      - run: pnpm install --frozen-lockfile
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next/
      - name: Start app server
        run: pnpm start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright tests
        run: BASE_URL=http://localhost:3000 PLAYWRIGHT_CI=1 npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── e2e: Cypress ─────────────────────────────────────────────────────────
  test-e2e-cypress:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ vars.E2E_RUNNER == 'cypress' }}
    container:
      image: cypress/included:latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next/
      - run: npm start &
      - run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Cypress tests
        run: npx cypress run --reporter junit --reporter-options "mochaFile=cypress-results/results.xml"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: cypress-results/

  # ── metrics collection ────────────────────────────────────────────────────
  metrics:
    runs-on: ubuntu-latest
    needs: [build, test-unit]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
      - name: Write metrics JSON
        run: |
          mkdir -p toolchain/metrics/results
          MEASURED_AT=$(node -e "process.stdout.write(new Date().toISOString())")
          cat > "toolchain/metrics/results/${{ env.VARIANT_ID }}.json" << EOF
          {
            "variantId": "${{ env.VARIANT_ID }}",
            "measuredAt": "$MEASURED_AT",
            "ciHost": "gitea",
            "runId": "${{ github.run_id }}",
            "toolVersions": {
              "node": "$(node --version)",
              "pnpm": "$(pnpm --version 2>/dev/null || echo '')"
            },
            "output": {
              "jsBundleSizeBytes": ${{ needs.build.outputs.js_bytes || 0 }},
              "cssBundleSizeBytes": ${{ needs.build.outputs.css_bytes || 0 }},
              "deployArtifactSizeBytes": ${{ needs.build.outputs.artifact_bytes || 0 }}
            }
          }
          EOF
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ env.VARIANT_ID }}
          path: toolchain/metrics/results/
          retention-days: 30
