name: Default Workflow

on:
  release:
    types:
      - "released"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    needs: [build,tests]

    outputs:
      meta: ${{ steps.meta.outputs.json }}

    steps:
      - uses: actions/checkout@v5

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata action
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/xisharkix/note-taking-app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            # tag event
            type=raw,value=v{{tag}}
            # default branch tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
  deploy:
    runs-on: ubuntu-latest

    needs: docker

    env:
      version: ${{ fromJSON(needs.docker.outputs.meta).labels['org.opencontainers.image.version'] }}
      image: ghcr.io/xisharkix/note-taking-app

    steps:
      - uses: actions/checkout@v5

      - name: Deploy Docker container
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          envs: GITHUB_TOKEN,GHCR_USERNAME
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker rm -f note-taking-app || true
            docker pull ${{ env.image }}:${{ env.version }}
            docker run -d --user 1000:1000 --name note-taking-app --restart unless-stopped -p 127.0.0.1:3000:3000 ${{ env.image }}:${{ env.version }}