name: CI
# Stack: pnpm · Turborepo · tsup (dual ESM+CJS) · Next.js · Vitest · Playwright
on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
env:
  VARIANT: "pnpm-turborepo-rolldown-vitest-playwright"
  PNPM_STORE: ~/.local/share/pnpm/store
jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      install-time: ${{ steps.install.outputs.duration }}
      cache-key: ${{ steps.key.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - id: key
        run: echo "value=pnpm-turbo-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE }}
          key: ${{ steps.key.outputs.value }}
      - id: install
        run: |
          pnpm config set store-dir $PNPM_STORE
          T0=$(date +%s%3N)
          pnpm install --frozen-lockfile
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: nm-${{ steps.key.outputs.value }}
  lint:
    runs-on: ubuntu-latest
    needs: install
    outputs:
      lint-time: ${{ steps.lint.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: lint
        run: |
          T0=$(date +%s%3N); pnpm run lint
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    outputs:
      tc-time: ${{ steps.tc.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: tc
        run: |
          T0=$(date +%s%3N); pnpm run typecheck
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: [install, lint, typecheck]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: build
        run: |
          T0=$(date +%s%3N); pnpm run build
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
      - run: |
          VARIANT=${{ env.VARIANT }} BUILD_DIR=apps/notes-app/.next \
          INSTALL_TIME=${{ needs.install.outputs.install-time }} \
          LINT_TIME=${{ needs.lint.outputs.lint-time }} \
          TC_TIME=${{ needs.typecheck.outputs.tc-time }} \
          BUILD_TIME=${{ steps.build.outputs.duration }} \
          node scripts/bundle-stats.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ env.VARIANT }}
          path: |
            pipeline-report.json
            packages/notes-schema/dist/
          retention-days: 30
