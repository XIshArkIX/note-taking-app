name: CI
# Stack: bun · no monorepo · Next.js/SWC · Vitest · Playwright
on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
env:
  VARIANT: "bun-none-nextjs-vitest-playwright"
jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      install-time: ${{ steps.install.outputs.duration }}
      cache-key: ${{ steps.key.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - id: key
        run: echo "value=bun-${{ hashFiles('bun.lock') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.key.outputs.value }}
          restore-keys: bun-
      - id: install
        run: |
          T0=$(date +%s%3N)
          bun install --frozen-lockfile
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ steps.key.outputs.value }}
  lint:
    runs-on: ubuntu-latest
    needs: install
    outputs:
      lint-time: ${{ steps.lint.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: lint
        run: |
          T0=$(date +%s%3N); bun run lint
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    outputs:
      tc-time: ${{ steps.tc.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: tc
        run: |
          T0=$(date +%s%3N); bun run typecheck
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: [install, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true
      - id: build
        run: |
          T0=$(date +%s%3N); bun run build
          DUR=$(($(date +%s%3N) - T0))
          echo "duration=${DUR}" >> "$GITHUB_OUTPUT"
      - run: |
          VARIANT=${{ env.VARIANT }} \
          INSTALL_TIME=${{ needs.install.outputs.install-time }} \
          LINT_TIME=${{ needs.lint.outputs.lint-time }} \
          TC_TIME=${{ needs.typecheck.outputs.tc-time }} \
          BUILD_TIME=${{ steps.build.outputs.duration }} \
          bun run scripts/bundle-stats.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ env.VARIANT }}
          path: pipeline-report.json
          retention-days: 30
